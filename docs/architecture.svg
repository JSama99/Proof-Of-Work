<svg width="100%" viewBox="0 0 680 800" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>POW Ledger Verification System — Multi-Agent Architecture</title>
  <desc>Two-agent system: a Decision Capture Agent watches Google Workspace signals (Gmail, Calendar, Drive) via MCP and proposes ledger entries to a Verification Agent over the A2A protocol. The Verification Agent uses MCP tools into the POW Ledger to detect patterns and synthesize reusable workflows. The founder approves before any verified entry is written. Both agents run on Vertex AI Gemini, deployed on Cloud Run / Agent Engine.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="290" y="30" width="100" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Founder</text>

  <path d="M340 74 L340 130 L190 130 L190 165" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="335" y="125" text-anchor="end" font-size="12" fill="#5F5E5A">logs decisions</text>

  <rect x="40" y="110" width="600" height="200" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="60" y="138" font-size="14" font-weight="500" fill="#085041">POW Ledger · existing, on Cloud Run</text>

  <rect x="70" y="165" width="240" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="190" y="188" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">React UI</text>
  <text x="190" y="208" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">shadcn/ui, dark theme</text>

  <rect x="370" y="165" width="240" height="125" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="490" y="186" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Backend + Ledger</text>
  <text x="490" y="208" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Express + Postgres</text>
  <text x="490" y="228" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Artifacts · proof units</text>
  <text x="490" y="248" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Ledger entries · SHA-256</text>
  <text x="490" y="268" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Lineage + verify APIs</text>

  <line x1="310" y1="195" x2="370" y2="195" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <path d="M490 290 L490 330 L340 330 L340 350" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="498" y="325" text-anchor="start" font-size="12" fill="#5F5E5A">exposed as MCP tools</text>

  <rect x="190" y="350" width="300" height="90" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="340" y="378" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">POW MCP Server</text>
  <text x="340" y="400" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">FastMCP · Cloud Run</text>
  <text x="340" y="420" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">list · lineage · verify · record · detect</text>

  <path d="M340 440 L340 465 L490 465 L490 510" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="40" y="480" width="600" height="180" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="60" y="508" font-size="14" font-weight="500" fill="#3C3489">Agent layer · new · Vertex AI · Agent Engine</text>

  <rect x="70" y="525" width="240" height="125" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="190" y="548" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Decision Capture Agent</text>
  <text x="190" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">ADK · Vertex AI Gemini</text>
  <text x="190" y="594" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Watches workspace signals</text>
  <text x="190" y="616" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Proposes ledger entries</text>

  <rect x="370" y="525" width="240" height="125" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="490" y="548" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Verification Agent</text>
  <text x="490" y="572" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">ADK · Vertex AI Gemini</text>
  <text x="490" y="594" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Pattern detection</text>
  <text x="490" y="616" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Workflow synthesis</text>

  <line x1="310" y1="590" x2="370" y2="590" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="340" y="582" text-anchor="middle" font-size="12" fill="#5F5E5A">A2A</text>

  <line x1="190" y1="650" x2="190" y2="700" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="70" y="700" width="240" height="70" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="190" y="724" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Google Workspace MCPs</text>
  <text x="190" y="746" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Gmail · Calendar · Drive</text>

  <path d="M610 587 L655 587 L655 52 L390 52" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="525" y="92" text-anchor="middle" font-size="12" fill="#5F5E5A">agent proposes · founder approves</text>
</svg>
